*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#FFF8F0;font-family:'DM Sans',sans-serif;letter-spacing:0.01em;min-height:100vh;overflow-x:hidden;transition:background .4s;}
#app{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
.blob{position:fixed;border-radius:50%;pointer-events:none;z-index:0;}
.screen{position:relative;z-index:1;width:100%;max-width:400px;display:flex;flex-direction:column;align-items:center;gap:16px;animation:fadeUp .35s both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{transform:scale(.88)}60%{transform:scale(1.04)}100%{transform:scale(1)}}
@keyframes flashAnim{0%{opacity:.7}100%{opacity:0}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes countPop{0%{transform:scale(1.6);opacity:0}60%{transform:scale(.95)}100%{transform:scale(1);opacity:1}}
.logo{font-family:'Bebas Neue',sans-serif;font-size:72px;font-weight:400;color:#E8709A;letter-spacing:.12em;line-height:1;text-align:center;width:100%;text-transform:uppercase;}
.subtitle{font-size:13px;color:#9B8EA5;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-top:-8px;}
.round-badge{background:rgba(249,168,201,.15);border:1px solid rgba(249,168,201,.4);border-radius:20px;padding:4px 16px;color:#E8709A;font-size:12px;font-weight:700;margin-top:-8px;}
.scoreboard{display:flex;gap:12px;width:100%;}
.score-card{flex:1;border-radius:20px;padding:16px 10px;text-align:center;transition:transform .3s,box-shadow .3s;border:2px solid;}
.score-name{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
.score-num{font-family:'Bebas Neue',sans-serif;font-size:56px;font-weight:400;line-height:1;}
.btn{border:none;border-radius:16px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:800;transition:transform .1s;-webkit-tap-highlight-color:transparent;}
.btn:active{transform:scale(.93)!important;}
.btn-primary{width:100%;padding:15px 0;font-size:17px;color:#fff;margin-top:6px;}
.btn-ghost{width:100%;padding:10px;background:none;border:1.5px solid rgba(155,142,165,.3);border-radius:12px;color:#9B8EA5;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-ghost:active{transform:scale(.96);}
.btn-music{background:none;border:1.5px solid #C8B8F0;border-radius:20px;padding:7px 18px;color:#A78BFA;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.btn-music.on{background:linear-gradient(135deg,#C8B8F0,#A78BFA);color:#fff;border-color:#A78BFA;}

/* Bomb */
.btn-bomb{flex:1;padding:18px 0;font-size:32px;line-height:1.2;border-radius:18px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:900;color:#fff;background:linear-gradient(135deg,#1a1a2e,#4a0010);box-shadow:0 6px 20px rgba(0,0,0,.5);animation:bombPulse 1s ease-in-out infinite;}
@keyframes bombPulse{0%,100%{transform:scale(1);box-shadow:0 6px 20px rgba(180,0,0,.4)}50%{transform:scale(1.04);box-shadow:0 8px 28px rgba(255,50,0,.7)}}
#explosion-overlay{position:fixed;inset:0;z-index:900;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:#111;overflow:hidden;}
.exp-emoji{font-size:120px;animation:expPop .4s cubic-bezier(.22,.68,0,1.3) both;}
.exp-text{font-family:'DM Sans',sans-serif;font-size:36px;color:#fff;text-align:center;animation:fadeUp .4s .3s both;}
.exp-sub{font-size:15px;color:rgba(255,255,255,.6);font-weight:700;animation:fadeUp .4s .5s both;}
@keyframes expPop{0%{transform:scale(0) rotate(-20deg);opacity:0}60%{transform:scale(1.3) rotate(5deg)}100%{transform:scale(1) rotate(0deg);opacity:1}}
.spark{position:absolute;border-radius:50%;animation:sparkFly 0.7s ease-out forwards;}
@keyframes sparkFly{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}}
.btn-settings-icon{background:none;border:1.5px solid #C8B8F0;border-radius:16px;padding:7px 16px;color:#A78BFA;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;}
.turn-announce{font-size:17px;color:#3D2C40;font-weight:700;text-align:center;}
.timer-row{display:flex;align-items:center;gap:10px;width:100%;}
.timer-circle{width:62px;height:62px;border-radius:50%;border:3px solid;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color .5s,color .5s,background .5s;}
.timer-num{font-family:'Bebas Neue',sans-serif;font-size:26px;}
.team-badge{border-radius:20px;padding:5px 16px;font-size:12px;font-weight:800;color:#fff;letter-spacing:.05em;display:inline-block;}
.mini-score{display:flex;flex-direction:column;gap:3px;align-items:flex-end;}
.mini-score span{border-radius:8px;padding:3px 10px;font-size:13px;font-weight:800;}
.card{width:100%;background:#fff;border-radius:24px;padding:26px 22px;box-shadow:0 8px 32px rgba(0,0,0,.07);border:2px solid rgba(249,168,201,.3);animation:cardIn .25s cubic-bezier(.22,.68,0,1.2) both;}
.card-word{font-family:'DM Sans',sans-serif;font-size:36px;color:#3D2C40;text-align:center;letter-spacing:.04em;text-transform:uppercase;margin-bottom:14px;}
.card-divider{height:2px;background:linear-gradient(90deg,#F9A8C9,#A8D4F9);border-radius:2px;margin-bottom:14px;}
.tabu-list{display:flex;flex-direction:column;gap:7px;}
.tabu-item{display:flex;align-items:center;gap:8px;background:#FFF0F5;border-radius:10px;padding:7px 12px;border:1px solid rgba(249,168,201,.4);}
.tabu-word{font-size:14px;font-weight:700;color:#E8709A;text-transform:uppercase;letter-spacing:.06em;}
.actions{display:flex;gap:8px;width:100%;}
.btn-tabu{flex:1;background:linear-gradient(135deg,#FFB3C1,#F77E9B);color:#fff;padding:15px 4px;font-size:13px;line-height:1.5;border-radius:18px;box-shadow:0 4px 14px rgba(255,179,193,.6);}
.btn-skip{flex:1;background:linear-gradient(135deg,#FFE599,#FFD55A);color:#C9960A;padding:15px 4px;font-size:13px;line-height:1.5;border-radius:18px;box-shadow:0 4px 14px rgba(255,229,153,.6);}
.btn-correct{flex:1.3;background:linear-gradient(135deg,#A8DFC9,#5ECFA0);color:#fff;padding:15px 4px;font-size:14px;line-height:1.5;border-radius:18px;box-shadow:0 4px 14px rgba(168,223,201,.6);}
.history-chips{width:100%;display:flex;flex-direction:column;gap:4px;}
.history-chip{display:flex;align-items:center;gap:8px;border-radius:8px;padding:5px 10px;font-size:12px;font-weight:700;color:#3D2C40;}
.review-stats{display:flex;gap:10px;width:100%;}
.stat-box{flex:1;border-radius:18px;padding:14px 8px;text-align:center;border:2px solid;}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:44px;line-height:1;}
.stat-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-top:4px;}
.history-list{width:100%;display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto;}
.history-row{display:flex;align-items:center;gap:8px;border-left:4px solid;border-radius:10px;padding:8px 12px;font-size:14px;font-weight:700;color:#3D2C40;}
.players-btn{background:none;border:1.5px solid;border-radius:10px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;margin-top:4px;letter-spacing:.04em;}
.speaker-announce{font-size:13px;font-weight:400;color:#9B8EA5;margin-top:3px;}
.countdown-speaker{font-size:16px;color:#3D2C40;font-weight:500;margin-top:-4px;}
.countdown-speaker strong{font-weight:800;}
#players-overlay{position:fixed;inset:0;background:rgba(61,44,64,.45);z-index:700;display:flex;align-items:center;justify-content:center;padding:20px;}
.players-box{background:#fff;border-radius:24px;padding:28px 24px;width:100%;max-width:340px;box-shadow:0 16px 48px rgba(0,0,0,.15);display:flex;flex-direction:column;gap:12px;animation:fadeUp .3s both;max-height:90vh;overflow-y:auto;}
.players-title{font-size:20px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;text-align:center;}
.players-subtitle{font-size:11px;color:#9B8EA5;font-weight:600;letter-spacing:.1em;text-transform:uppercase;text-align:center;margin-top:-6px;}
.player-row{display:flex;align-items:center;gap:8px;}
.player-input{flex:1;border:2px solid #E8E0F0;border-radius:10px;padding:10px 12px;font-size:15px;font-family:'Inter',sans-serif;font-weight:600;color:#3D2C40;outline:none;}
.player-input:focus{border-color:#A78BFA;}
.player-del{background:none;border:none;font-size:18px;color:#E8709A;cursor:pointer;padding:4px 8px;line-height:1;border-radius:8px;}
.player-del:active{background:#FFE0E8;}
.player-add-btn{background:none;border:2px dashed #C8B8F0;border-radius:12px;padding:10px;font-size:14px;font-weight:700;color:#A78BFA;cursor:pointer;font-family:'Inter',sans-serif;width:100%;}
.player-add-btn:active{background:#F3F0FF;}
.player-limit{text-align:center;font-size:12px;color:#C8B8F0;font-weight:600;}
.edit-hint{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-top:2px;}
#name-editor{position:fixed;inset:0;background:rgba(61,44,64,.45);z-index:700;display:flex;align-items:center;justify-content:center;padding:20px;}
.name-editor-box{background:#fff;border-radius:24px;padding:28px 24px;width:100%;max-width:320px;box-shadow:0 16px 48px rgba(0,0,0,.15);display:flex;flex-direction:column;gap:16px;animation:fadeUp .3s both;}
.name-editor-title{font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;text-align:center;}
.name-input{border:2px solid #E8E0F0;border-radius:12px;padding:12px 16px;font-size:18px;font-family:'Inter',sans-serif;font-weight:600;text-align:center;outline:none;width:100%;color:#3D2C40;}
.name-input:focus{border-color:#A78BFA;}
.name-editor-btns{display:flex;gap:10px;align-items:center;}
#player-count-error{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:800;pointer-events:none;}
#player-count-error .error-inner{background:#3D2C40;color:#fff;border-radius:16px;padding:14px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 24px rgba(0,0,0,.3);animation:fadeUp .3s both;max-width:300px;width:85%;}
.error-icon{font-size:22px;flex-shrink:0;}
.error-text{font-size:13px;line-height:1.5;}
.error-text strong{color:#F9A8C9;}
.theme-swatches{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
.theme-swatch{width:44px;height:44px;border-radius:12px;cursor:pointer;border:3px solid transparent;transition:all .2s;position:relative;display:flex;align-items:center;justify-content:center;font-size:18px;}
.theme-swatch.active{border-color:#fff;box-shadow:0 0 0 2px rgba(255,255,255,.5);}
.theme-swatch:active{transform:scale(.9);}
.version-tag{position:fixed;bottom:14px;left:16px;font-size:11px;color:#C8B8F0;font-weight:600;letter-spacing:.08em;z-index:10;pointer-events:none;}
#flash{position:fixed;inset:0;pointer-events:none;z-index:999;opacity:0;}
#countdown-overlay{position:fixed;inset:0;background:rgba(255,248,240,.95);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
.countdown-num{font-family:'Bebas Neue',sans-serif;font-size:140px;font-weight:400;line-height:1;letter-spacing:.08em;}
.countdown-team{border-radius:24px;padding:8px 28px;font-size:14px;font-weight:600;color:#fff;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;}
.countdown-label{font-size:16px;font-weight:700;color:#9B8EA5;letter-spacing:.1em;text-transform:uppercase;}
#settings-overlay{position:fixed;inset:0;background:rgba(61,44,64,.45);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px;}
.settings-box{background:#fff;border-radius:24px;padding:28px 24px;width:100%;max-width:340px;box-shadow:0 16px 48px rgba(0,0,0,.15);display:flex;flex-direction:column;gap:20px;animation:fadeUp .3s both;}
.settings-title{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:.15em;text-transform:uppercase;color:#3D2C40;text-align:center;}
.settings-row{display:flex;flex-direction:column;gap:8px;}
.settings-label{font-size:13px;font-weight:800;color:#9B8EA5;text-transform:uppercase;letter-spacing:.08em;}
.settings-opts{display:flex;gap:8px;flex-wrap:wrap;}
.opt-btn{flex:1;min-width:52px;padding:10px 6px;border-radius:12px;border:2px solid #E8E0F0;background:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:800;color:#9B8EA5;cursor:pointer;text-align:center;transition:all .15s;}
.opt-btn.active{background:linear-gradient(135deg,#C8B8F0,#A78BFA);border-color:#A78BFA;color:#fff;}

</style>
</head>

var audioCtx = null;
var masterGain = null;
var musicPlaying = false;
var musicLoopTimer = null;
var musicPlayingRef = false;

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.12;
    masterGain.connect(audioCtx.destination);
  }
  return audioCtx;
}

// ── Karplus-Strong string synthesis (simulates plucked strings) ──
// ══════════════════════════════════════════════
//  CUMBIA VILLERA ENGINE
//  Instruments: synth bass, cencerro, redoblante,
//               hi-hat, melodía de teclado tropical
// ══════════════════════════════════════════════

// Synth bass: square + sub for that "bajo cumbia" punch
function playBajoCumbia(freq, start, dur, vol) {
  var ac = audioCtx;
  // Sub oscillator
  var sub = ac.createOscillator(), gSub = ac.createGain();
  sub.type = 'sine'; sub.frequency.value = freq / 2;
  sub.connect(gSub); gSub.connect(masterGain);
  gSub.gain.setValueAtTime(vol * 0.6, start);
  gSub.gain.exponentialRampToValueAtTime(0.001, start + Math.min(dur, 0.28));
  sub.start(start); sub.stop(start + Math.min(dur, 0.3));

  // Main square wave — compressed, gritty
  var osc = ac.createOscillator(), g = ac.createGain();
  var lp = ac.createBiquadFilter();
  osc.type = 'square'; osc.frequency.value = freq;
  lp.type = 'lowpass'; lp.frequency.value = 800; lp.Q.value = 2;
  osc.connect(lp); lp.connect(g); g.connect(masterGain);
  g.gain.setValueAtTime(vol * 0.45, start);
  g.gain.linearRampToValueAtTime(vol * 0.5, start + 0.01);
  g.gain.exponentialRampToValueAtTime(0.001, start + Math.min(dur, 0.22));
  osc.start(start); osc.stop(start + Math.min(dur, 0.25));
}

// Cencerro (cowbell) — the heart of cumbia
function playCencerro(start, vol) {
  var ac = audioCtx;
  var t = start;
  // Two slightly detuned square oscillators for metallic ring
  [[562, 1.0], [845, 0.6]].forEach(function(p) {
    var o = ac.createOscillator(), g = ac.createGain(), bp = ac.createBiquadFilter();
    o.type = 'square'; o.frequency.value = p[0];
    bp.type = 'bandpass'; bp.frequency.value = p[0] * 1.1; bp.Q.value = 8;
    o.connect(bp); bp.connect(g); g.connect(masterGain);
    g.gain.setValueAtTime(vol * p[1], t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
    o.start(t); o.stop(t + 0.3);
  });
}

// Redoblante (snare) — sharp and dry
function playRedoblante(start, vol) {
  var ac = audioCtx;
  var sr = ac.sampleRate;
  // Noise component
  var buf = ac.createBuffer(1, Math.floor(sr * 0.12), sr);
  var d = buf.getChannelData(0);
  for (var i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.exp(-i/(sr*0.025));
  var ns = ac.createBufferSource(), ng = ac.createGain(), nbp = ac.createBiquadFilter();
  ns.buffer = buf; nbp.type = 'bandpass'; nbp.frequency.value = 1800; nbp.Q.value = 1;
  ns.connect(nbp); nbp.connect(ng); ng.connect(masterGain);
  ng.gain.value = vol * 0.7;
  ns.start(start);
  // Tone component (body)
  var o = ac.createOscillator(), og = ac.createGain();
  o.type = 'triangle'; o.frequency.setValueAtTime(220, start);
  o.frequency.exponentialRampToValueAtTime(80, start + 0.06);
  o.connect(og); og.connect(masterGain);
  og.gain.setValueAtTime(vol * 0.5, start);
  og.gain.exponentialRampToValueAtTime(0.001, start + 0.07);
  o.start(start); o.stop(start + 0.08);
}

// Hi-hat cerrado (closed)
function playHihat(start, vol) {
  var ac = audioCtx;
  var sr = ac.sampleRate;
  var buf = ac.createBuffer(1, Math.floor(sr * 0.06), sr);
  var d = buf.getChannelData(0);
  for (var i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.exp(-i/(sr*0.006));
  var src = ac.createBufferSource(), g = ac.createGain(), hp = ac.createBiquadFilter();
  src.buffer = buf; hp.type = 'highpass'; hp.frequency.value = 7000;
  src.connect(hp); hp.connect(g); g.connect(masterGain);
  g.gain.value = vol;
  src.start(start);
}

// Bombo (kick) — deep thump
function playBombo(start, vol) {
  var ac = audioCtx;
  var o = ac.createOscillator(), g = ac.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(120, start);
  o.frequency.exponentialRampToValueAtTime(40, start + 0.08);
  o.connect(g); g.connect(masterGain);
  g.gain.setValueAtTime(vol, start);
  g.gain.exponentialRampToValueAtTime(0.001, start + 0.18);
  o.start(start); o.stop(start + 0.2);
  // Click transient
  var buf = ac.createBuffer(1, Math.floor(ac.sampleRate*0.015), ac.sampleRate);
  var d = buf.getChannelData(0);
  for (var i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(ac.sampleRate*0.002));
  var ns=ac.createBufferSource(), ng=ac.createGain();
  ns.buffer=buf; ns.connect(ng); ng.connect(masterGain);
  ng.gain.value = vol*0.5; ns.start(start);
}

// Melodía: teclado tropical (sinewave + 2nd harmonic = flute-ish)
function playTecla(freq, start, dur, vol) {
  var ac = audioCtx;
  [1, 2, 3].forEach(function(harm, i) {
    var vols = [0.5, 0.2, 0.06];
    var o = ac.createOscillator(), g = ac.createGain();
    o.type = 'sine'; o.frequency.value = freq * harm;
    o.connect(g); g.connect(masterGain);
    g.gain.setValueAtTime(0, start);
    g.gain.linearRampToValueAtTime(vol * vols[i], start + 0.02);
    g.gain.setValueAtTime(vol * vols[i], start + dur * 0.55);
    g.gain.exponentialRampToValueAtTime(0.001, start + dur);
    o.start(start); o.stop(start + dur + 0.02);
  });
}

var reverbNode = null;

function scheduleCumbiaLoop(startTime) {
  // Cumbia villera: C minor, 110 BPM — fiestero y movido
  var BPM = 110;
  var B = 60 / BPM;      // ~0.545s per beat
  var bar = B * 4;
  var loop = bar * 4;    // 4 bars ~8.7s

  var N = {
    C2:65.41, G2:98, C3:130.81, Eb3:155.56, F3:174.61, G3:196,
    Ab3:207.65, Bb3:233.08, C4:261.63, D4:293.66, Eb4:311.13,
    F4:349.23, G4:392, Ab4:415.3, Bb4:466.16, C5:523.25
  };

  // ── Melodía: tropical, repetitiva y pegadiza ──
  // 2 bar riff que se repite
  var riff = [
    [N.G4,  0,       B*0.4],
    [N.Eb4, B*0.5,   B*0.4],
    [N.F4,  B*1,     B*0.4],
    [N.G4,  B*1.5,   B*0.4],
    [N.Ab4, B*2,     B*0.75],
    [N.G4,  B*3,     B*0.4],
    [N.F4,  B*3.5,   B*0.4],
    // bar 2
    [N.Eb4, bar,     B*0.4],
    [N.D4,  bar+B*0.5, B*0.4],
    [N.Eb4, bar+B*1, B*0.4],
    [N.F4,  bar+B*1.5, B*0.4],
    [N.G4,  bar+B*2, B*0.75],
    [N.F4,  bar+B*3, B*0.4],
    [N.Eb4, bar+B*3.5, B*0.4],
  ];

  // Repetir el riff en barras 3 y 4 (con variación de resolución)
  var mel = riff.slice();
  riff.forEach(function(n) { mel.push([n[0], n[1] + bar*2, n[2]]); });
  // Resolver en bar 4 hacia la tónica
  mel.push([N.C4, bar*3 + B*2, B*0.5]);
  mel.push([N.Eb4,bar*3 + B*2.5, B*0.5]);
  mel.push([N.G4, bar*3 + B*3, B]);

  // ── Bajo: patrón típico cumbia, cuartas/quintas ──
  // bar 1: C → G → C → G
  var bass = [];
  var bassPattern = [
    [N.C2, 0, B*0.45], [N.G2, B*0.5, B*0.45],
    [N.C3, B, B*0.45], [N.G2, B*1.5, B*0.45],
    [N.C2, B*2,B*0.45],[N.G2, B*2.5, B*0.45],
    [N.C3, B*3,B*0.45],[N.G2, B*3.5, B*0.45],
  ];
  // bar 2: Eb → Bb
  var bassBar2 = [
    [N.Eb3,bar, B*0.45],[N.Bb3,bar+B*0.5,B*0.45],
    [N.Eb3,bar+B,B*0.45],[N.Bb3,bar+B*1.5,B*0.45],
    [N.F3, bar+B*2,B*0.45],[N.C3,bar+B*2.5,B*0.45],
    [N.F3, bar+B*3,B*0.45],[N.C3,bar+B*3.5,B*0.45],
  ];
  bassPattern.forEach(function(n){ bass.push(n); bass.push([n[0], n[1]+bar*2, n[2]]); });
  bassBar2.forEach(function(n){    bass.push(n); bass.push([n[0], n[1]+bar*2, n[2]]); });

  // ── Percusión: el alma de la cumbia ──
  for (var b = 0; b < 4; b++) {
    var t = startTime + bar * b;
    // Bombo en 1 y 3
    playBombo(t,         0.75);
    playBombo(t + B*2,   0.7);
    // Redoblante en 2 y 4 (a veces con anticipación)
    playRedoblante(t + B,      0.6);
    playRedoblante(t + B*3,    0.65);
    playRedoblante(t + B*3.75, 0.35); // anticipación
    // Cencerro: el patrón 3+3+2 de cumbia
    playCencerro(t,           0.55);
    playCencerro(t + B*0.75,  0.35);
    playCencerro(t + B*1.5,   0.55);
    playCencerro(t + B*2.25,  0.35);
    playCencerro(t + B*3,     0.55);
    playCencerro(t + B*3.5,   0.35);
    // Hi-hat en corcheas
    for (var i = 0; i < 8; i++) {
      playHihat(t + B * i * 0.5, i % 2 === 0 ? 0.18 : 0.1);
    }
  }

  mel.forEach(function(m)  { playTecla(m[0], startTime + m[1], m[2], 0.4); });
  bass.forEach(function(m) { playBajoCumbia(m[0], startTime + m[1], m[2], 0.65); });

  return loop;
}

function startMusic() {
  if (musicPlayingRef) return;
  musicPlayingRef = true;
  getAudioCtx();
  reverbNode = null;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  var next = audioCtx.currentTime + 0.1;
  function tick() {
    if (!musicPlayingRef) return;
    var dur = scheduleCumbiaLoop(next);
    next += dur;
    musicLoopTimer = setTimeout(tick, (dur - 1) * 1000);
  }
  tick();
  musicPlaying = true;
}

function stopMusic() {
  musicPlayingRef = false;
  clearTimeout(musicLoopTimer);
  reverbNode = null;
  if (audioCtx && audioCtx.state === 'running') audioCtx.suspend();
  musicPlaying = false;
}

function toggleMusic() {
  if (musicPlaying) stopMusic(); else startMusic();
  var btn = document.getElementById('music-btn');
  if (btn) btn.className = 'btn-music' + (musicPlaying ? ' on' : '');
  if (btn) btn.textContent = musicPlaying ? '🎵 Música: ON' : '🎵 Música: OFF';
}

function sfxEndTurn() {
  try {
    var ac = getSfxCtx();
    var t = ac.currentTime;
    // Three descending tones — "tiempo terminado"
    [[523, 0], [415, 0.18], [330, 0.36]].forEach(function(p) {
      var o = ac.createOscillator(), g = ac.createGain();
      o.type = 'sine'; o.frequency.value = p[0];
      o.connect(g); g.connect(ac.destination);
      g.gain.setValueAtTime(0, t + p[1]);
      g.gain.linearRampToValueAtTime(0.35, t + p[1] + 0.03);
      g.gain.exponentialRampToValueAtTime(0.001, t + p[1] + 0.28);
      o.start(t + p[1]); o.stop(t + p[1] + 0.3);
    });
  } catch(e) {}
}

function sfxCountdownBeep(secondsLeft) {
  try {
    var ac = getSfxCtx();
    var t = ac.currentTime;
    // Pitch rises as time runs out: 10s=600hz, 1s=1100hz
    var freq = 600 + (10 - secondsLeft) * 50;
    var vol = secondsLeft <= 3 ? 0.22 : 0.13;
    var o = ac.createOscillator(), g = ac.createGain();
    o.type = 'square'; o.frequency.value = freq;
    o.connect(g); g.connect(ac.destination);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    o.start(t); o.stop(t + 0.14);
  } catch(e) {}
}

  if (sfxCtx.state === 'suspended') sfxCtx.resume();
  return sfxCtx;
}

function sfxSkip() {
  var ac = getSfxCtx();
  var t = ac.currentTime;

  o.type='sine'; o.frequency.setValueAtTime(440,t); o.frequency.linearRampToValueAtTime(320,t+.15);
  o.connect(g); g.connect(ac.destination);
  g.gain.setValueAtTime(.25,t); g.gain.exponentialRampToValueAtTime(.001,t+.2);
  o.start(t); o.stop(t+.21);
}

function getRandomCard() {
  var available = [];
  for (var i = 0; i < CARDS.length; i++) {
    if (!state.usedIndices[i]) available.push(i);
  }
  if (available.length === 0) {
    state.usedIndices = {};
    for (var j = 0; j < CARDS.length; j++) available.push(j);
  }
  var idx = available[Math.floor(Math.random() * available.length)];
  state.usedIndices[idx] = true;
  return CARDS[idx];
}

function flash(color) {
  var el = document.getElementById('flash');
  el.style.background = color;
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = 'flashAnim .35s ease forwards';
}

function stopTimer() { clearInterval(state.timerInterval); state.timerInterval = null; }

function startTimer() {
  stopTimer();
  state.timerInterval = setInterval(function() {
    state.timeLeft--;
    var el = document.getElementById('timer-num');
    if (el) el.textContent = state.timeLeft;
    var circle = document.getElementById('timer-circle');
    if (circle) {
      var pct = state.timeLeft / settings.turnDuration;
      if (pct > 0.5) {
        circle.style.borderColor='#3BAE7E'; circle.style.color='#3BAE7E'; circle.style.background='#A8DFC9'; circle.style.animation='none';
      } else if (pct > 0.2) {
        circle.style.borderColor='#E8854A'; circle.style.color='#E8854A'; circle.style.background='#FFCBA4'; circle.style.animation='none';
      } else {
        circle.style.borderColor='#E8325A'; circle.style.color='#E8325A'; circle.style.background='#FFB3C1'; circle.style.animation='pulse .7s infinite';
      }
    }
    if (!state.bombUsed && !state.bombActive && state.timeLeft <= state.bombAt) {
      state.bombActive = true;
      renderActions();
    }
    if (state.timeLeft <= 0) { stopTimer(); sfxEndTurn(); state.screen = 'review'; renderCurrent(); }
    else if (state.timeLeft <= 10) { sfxCountdownBeep(state.timeLeft); }
  }, 1000);
}

function scheduleBomb() {
  // Bomb appears at a random moment between 20%..70% of the turn elapsed
  var dur = settings.turnDuration;
  var minT = Math.floor(dur * 0.30);  // at least 30% remaining
  var maxT = Math.floor(dur * 0.80);  // at most 80% elapsed
  // bombAt = seconds remaining when bomb appears
  state.bombAt = dur - Math.floor(Math.random() * (maxT - minT + 1)) - minT;
  state.bombActive = false;
  state.bombUsed = false;
}

function startTurn() {
  // Validate equal player counts before first turn
  var isFirst = state.round === 1 && state.currentTeam === 0;
  if (isFirst && PLAYERS[0].length !== PLAYERS[1].length) {
    showPlayerCountError();
    return;
  }
  stopTimer();
  state.turnHistory = [];
  state.timeLeft = settings.turnDuration;
  state.card = getRandomCard();
  scheduleBomb();
  showCountdown(3, function() {
    state.screen = 'playing';
    renderCurrent();
    startTimer();
  });
}

function showPlayerCountError() {
  var existing = document.getElementById('player-count-error');
  if (existing) { existing.remove(); return; }
  var toast = document.createElement('div');
  toast.id = 'player-count-error';
  toast.innerHTML =
    '<div class="error-inner">' +
      '<div class="error-icon">⚠️</div>' +
      '<div class="error-text">Ambos equipos deben tener la misma cantidad de jugadores<br>' +
      '<strong>' + TEAM_NAMES[0] + ': ' + PLAYERS[0].length + '</strong> · ' +
      '<strong>' + TEAM_NAMES[1] + ': ' + PLAYERS[1].length + '</strong></div>' +
    '</div>';
  document.body.appendChild(toast);
  setTimeout(function() { if (toast.parentNode) toast.remove(); }, 3500);
}

function showCountdown(n, cb) {
  var existing = document.getElementById('countdown-overlay');
  if (existing) existing.remove();
  var tc = TC[state.currentTeam];
  var overlay = document.createElement('div');
  overlay.id = 'countdown-overlay';

  function tick(num) {
    overlay.innerHTML =
      '<div class="countdown-team" style="background:' + tc.grad + '">' + TEAM_NAMES[state.currentTeam] + '</div>' +
      '<div class="countdown-speaker">Le toca a <strong>' + PLAYERS[state.currentTeam][state.currentSpeaker[state.currentTeam]] + '</strong></div>' +
      '<div class="countdown-num" id="cdn" style="color:' + tc.dark + '">' + num + '</div>' +
      '<div class="countdown-label">¡Preparate!</div>';
    document.body.appendChild(overlay);
    var el = document.getElementById('cdn');
    if (el) { el.style.animation='none'; el.offsetHeight; el.style.animation='countPop .8s cubic-bezier(.22,.68,0,1.2) both'; }

    try {
      var ac = getSfxCtx();
      var o=ac.createOscillator(), g=ac.createGain();
      o.type='sine'; o.frequency.value = num===1 ? 880 : 660;
      o.connect(g); g.connect(ac.destination);
      g.gain.setValueAtTime(0.3, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.25);
      o.start(ac.currentTime); o.stop(ac.currentTime+0.26);
    } catch(e) {}

    if (num > 1) {
      setTimeout(function(){ tick(num-1); }, 900);
    } else {
      setTimeout(function(){ overlay.remove(); cb(); }, 800);
    }
  }
  tick(n);
}

function renderActions() {
  var area = document.getElementById('actions-area');
  if (!area) return;
  if (state.bombActive && !state.bombUsed) {
    // Bomba: reemplaza Tabú y Pasar, pero mantiene Correcto
    area.innerHTML =
      '<button class="btn-bomb" onclick="triggerBomb()">💣<br/>¡BOMBA!</button>' +
      '<button class="btn btn-correct" onclick="handleResult(\'correct\')" style="flex:none;width:90px">✓<br/>Correcto</button>';
  } else {
    area.innerHTML =
      '<button class="btn btn-tabu" onclick="handleResult(\'tabu\')">🚫<br/>Tabú</button>' +
      '<button class="btn btn-skip" onclick="handleResult(\'skip\')">⏭<br/>Pasar</button>' +
      '<button class="btn btn-correct" onclick="handleResult(\'correct\')">✓<br/>Correcto</button>';
  }
}

function triggerBomb() {
  state.bombUsed = true;
  state.bombActive = false;
  state.scores[state.currentTeam]--;
  stopTimer();

  // Sound: big boom
  try {
    var ac = getSfxCtx();
    var t = ac.currentTime;
    // Low thump
    var o1=ac.createOscillator(), g1=ac.createGain();
    o1.type='sawtooth'; o1.frequency.setValueAtTime(120,t); o1.frequency.exponentialRampToValueAtTime(20,t+0.6);
    o1.connect(g1); g1.connect(ac.destination);
    g1.gain.setValueAtTime(0.8,t); g1.gain.exponentialRampToValueAtTime(0.001,t+0.7);
    o1.start(t); o1.stop(t+0.7);
    // Noise burst
    var buf=ac.createBuffer(1,Math.floor(ac.sampleRate*0.5),ac.sampleRate);
    var d=buf.getChannelData(0);
    for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(ac.sampleRate*0.08));
    var ns=ac.createBufferSource(), ng=ac.createGain();
    ns.buffer=buf; ns.connect(ng); ng.connect(ac.destination);
    ng.gain.setValueAtTime(0.6,t); ng.gain.exponentialRampToValueAtTime(0.001,t+0.5);
    ns.start(t);
  } catch(e) {}

  showExplosion();
}

function showExplosion() {
  var ov = document.createElement('div');
  ov.id = 'explosion-overlay';

  // Sparks
  var colors = ['#FF4500','#FF8C00','#FFD700','#FF6347','#FF0000','#FFA500'];
  var sparksHtml = '';
  for (var i = 0; i < 24; i++) {
    var angle = (i / 24) * 360;
    var dist = 120 + Math.random() * 140;
    var tx = Math.round(Math.cos(angle * Math.PI/180) * dist);
    var ty = Math.round(Math.sin(angle * Math.PI/180) * dist);
    var size = 8 + Math.floor(Math.random() * 14);
    var color = colors[i % colors.length];
    var delay = (Math.random() * 0.2).toFixed(2);
    sparksHtml += '<div class="spark" style="width:' + size + 'px;height:' + size + 'px;background:' + color +
      ';top:50%;left:50%;margin-top:-' + Math.floor(size/2) + 'px;margin-left:-' + Math.floor(size/2) + 'px;' +
      '--tx:' + tx + 'px;--ty:' + ty + 'px;animation-delay:' + delay + 's"></div>';
  }

  ov.innerHTML =
    sparksHtml +
    '<div class="exp-emoji">💥</div>' +
    '<div class="exp-text">¡BOOOOM!</div>' +
    '<div class="exp-sub">Fin del turno</div>';

  document.body.appendChild(ov);

  setTimeout(function() {
    ov.remove();
    state.screen = 'review';
    renderCurrent();
  }, 2200);
}

function handleResult(result) {
  if (!state.card) return;
  if (result==='correct') { sfxCorrect(); flash('#B8F5D8'); state.scores[state.currentTeam]++; }
  else if (result==='tabu') { sfxTabu(); flash('#FFB3C1'); state.scores[state.currentTeam]--; }
  else { sfxSkip(); flash('#FFE9A0'); }
  state.turnHistory.push({ word: state.card.palabra, result: result });
  state.card = getRandomCard();
  // Bomb disappears after one word — mark used so it never re-triggers
  if (state.bombActive) { state.bombActive = false; state.bombUsed = true; }
  renderCard();
  renderActions();
  renderMiniHistory();
  updateMiniScore();
}

function endTurn() { stopTimer(); sfxEndTurn(); state.screen = 'review'; renderCurrent(); }

function nextTurn() {
  var nextTeam = (state.currentTeam + 1) % 2;
  var nextRound = nextTeam === 0 ? state.round + 1 : state.round;
  if (nextRound > settings.maxRounds) { state.screen = 'gameover'; renderCurrent(); return; }
  // Advance speaker for the team that just played
  var prevTeam = state.currentTeam;
  state.currentSpeaker[prevTeam] = (state.currentSpeaker[prevTeam] + 1) % PLAYERS[prevTeam].length;
  state.currentTeam = nextTeam;
  state.round = nextRound;
  state.screen = 'home';
  state.card = null;
  state.timeLeft = settings.turnDuration;
  state.turnHistory = [];
  renderCurrent();
}

function resetGame() {
  stopTimer();
  state = { screen:'home', scores:[0,0], currentTeam:0, round:1, maxRounds:settings.maxRounds,
    card:null, timeLeft:settings.turnDuration, timerInterval:null, turnHistory:[], usedIndices:{},
    currentSpeaker:[0,0] };
  renderCurrent();
}

// ═══════════════════════════════════════
//  SETTINGS
// ═══════════════════════════════════════
function openSettings() {
  var existing = document.getElementById('settings-overlay');
  if (existing) { existing.remove(); return; }
  var ov = document.createElement('div');
  ov.id = 'settings-overlay';
  ov.onclick = function(e) { if (e.target===ov) ov.remove(); };

  renderSettingsContent(ov);
  document.body.appendChild(ov);
}

function renderSettingsContent(ov) {
  var durations = [30, 45, 60, 90, 120];
  var rounds = [2, 3, 4, 5];

  var durBtns = durations.map(function(d) {
    var act = settings.turnDuration===d ? ' active' : '';
    return '<button class="opt-btn' + act + '" onclick="setSetting(\'turnDuration\',' + d + ')">' + d + 's</button>';
  }).join('');

  var rndBtns = rounds.map(function(r) {
    var act = settings.maxRounds===r ? ' active' : '';
    return '<button class="opt-btn' + act + '" onclick="setSetting(\'maxRounds\',' + r + ')">' + r + '</button>';
  }).join('');

  var swatches = THEMES.map(function(th, i) {
    var act = settings.theme === i ? ' active' : '';
    return '<div class="theme-swatch' + act + '" title="' + th.name + '" ' +
      'style="background:' + th.bg + ';border-color:' + (settings.theme===i ? th.text : 'transparent') + '" ' +
      'onclick="applyTheme(' + i + ');renderSettingsContent(document.getElementById(\'settings-overlay\'))">' +
      th.emoji +
    '</div>';
  }).join('');

  var t = getTheme();
  ov.innerHTML =
    '<div class="settings-box" style="background:' + t.settingsBg + ';color:' + t.text + '">' +
      '<div class="settings-title" style="color:' + t.text + '">⚙️ Configuración</div>' +
      '<div class="settings-row">' +
        '<div class="settings-label" style="color:' + t.subtext + '">⏱ Tiempo por turno</div>' +
        '<div class="settings-opts">' + durBtns + '</div>' +
      '</div>' +
      '<div class="settings-row">' +
        '<div class="settings-label" style="color:' + t.subtext + '">🔄 Cantidad de rondas</div>' +
        '<div class="settings-opts">' + rndBtns + '</div>' +
      '</div>' +
      '<div class="settings-row">' +
        '<div class="settings-label" style="color:' + t.subtext + '">🎨 Tema visual</div>' +
        '<div class="theme-swatches">' + swatches + '</div>' +
      '</div>' +
      '<button class="btn btn-primary" style="background:' + t.grad + ';box-shadow:0 4px 14px rgba(0,0,0,.3);margin-top:4px" onclick="document.getElementById(\'settings-overlay\').remove()">Listo ✓</button>' +
    '</div>';
}

function setSetting(key, val) {
  settings[key] = val;
  var ov = document.getElementById('settings-overlay');
  if (ov) renderSettingsContent(ov);
}

// ═══════════════════════════════════════
//  DOM HELPERS
// ═══════════════════════════════════════
function el(tag, attrs, content) {
  var html = '<' + tag;
  if (attrs) html += ' ' + attrs;
  html += '>';
  if (content) html += content;
  html += '</' + tag + '>';
  return html;
}

function musicBtnHTML(compact) {
  var on = musicPlaying;
  var label = on ? (compact ? '🎵 ON' : '🎵 Música: ON') : (compact ? '🎵 OFF' : '🎵 Música: OFF');
  return '<button id="music-btn" class="btn-music' + (on?' on':'') + '" onclick="toggleMusic()">' + label + '</button>';
}

function makeBlobs(blobs) {
  var _th = getTheme();
  document.querySelectorAll('.blob').forEach(function(b){ b.remove(); });
  blobs.forEach(function(b, i) {
    var d = document.createElement('div');
    d.className = 'blob';
    // Override color from theme
    var themeColor = i===0 ? _th.blob1 : (i===1 ? _th.blob2 : _th.blob3);
    b = Object.assign({}, b, {rgba: themeColor});
    d.style.width = b.w; d.style.height = b.h;
    d.style.background = 'radial-gradient(circle, ' + themeColor + ' 0%, transparent 70%)';
    d.style.opacity = 1;
    if (b.top) d.style.top = b.top;
    if (b.bottom) d.style.bottom = b.bottom;
    if (b.left) d.style.left = b.left;
    if (b.right) d.style.right = b.right;
    document.body.appendChild(d);
  });
}

function renderCard() {
  var area = document.getElementById('card-area');
  if (!area || !state.card) return;
  var tabuItems = state.card.tabu.map(function(t) {
    return '<div class="tabu-item"><span>🚫</span><span class="tabu-word">' + t + '</span></div>';
  }).join('');
  area.innerHTML =
    '<div class="card">' +
      '<div class="card-word">' + state.card.palabra + '</div>' +
      '<div class="card-divider"></div>' +
      '<div class="tabu-list">' + tabuItems + '</div>' +
    '</div>';
}

function renderMiniHistory() {
  var area = document.getElementById('mini-history');
  if (!area) return;
  var recent = state.turnHistory.slice().reverse().slice(0,4);
  area.innerHTML = recent.map(function(h, i) {
    var bg = h.result==='correct' ? '#EEFAF4' : h.result==='tabu' ? '#FFF0F3' : '#FFFBEA';
    var bc = h.result==='correct' ? '#A8DFC9' : h.result==='tabu' ? '#FFB3C1' : '#FFE599';
    var icon = h.result==='correct' ? '✓' : h.result==='tabu' ? '🚫' : '⏭';
    var op = Math.max(.3, 1 - i*.22);
    return '<div class="history-chip" style="background:' + bg + ';border:1px solid ' + bc + ';opacity:' + op + '">' + icon + ' ' + h.word + '</div>';
  }).join('');
}

function updateMiniScore() {
  var ec = document.getElementById('mini-correct');
  var et = document.getElementById('mini-tabu');
  var correct = state.turnHistory.filter(function(h){ return h.result==='correct'; }).length;
  var tabu    = state.turnHistory.filter(function(h){ return h.result==='tabu'; }).length;
  if (ec) ec.textContent = '✓ ' + correct;
  if (et) et.textContent = '🚫 ' + tabu;
}

// ═══════════════════════════════════════
//  SCREENS
// ═══════════════════════════════════════
function closeNameEditor() { var el = document.getElementById('name-editor'); if (el) el.remove(); }
function closePlayers() { var el = document.getElementById('players-overlay'); if (el) el.remove(); renderHome(); }

// ── Players editor ──
function openPlayers(teamIdx) {
  var existing = document.getElementById('players-overlay');
  if (existing) { existing.remove(); return; }
  var ov = document.createElement('div');
  ov.id = 'players-overlay';
  ov.onclick = function(e) { if (e.target === ov) ov.remove(); };
  document.body.appendChild(ov);
  renderPlayersContent(teamIdx);
}

function renderPlayersContent(teamIdx) {
  var ov = document.getElementById('players-overlay');
  if (!ov) return;
  var tc = TC[teamIdx];
  var players = PLAYERS[teamIdx];
  var canAdd = players.length < 5;

  var rows = players.map(function(name, idx) {
    return '<div class="player-row">' +
      '<input class="player-input" maxlength="14" value="' + name + '" ' +
        'onchange="updatePlayerName(' + teamIdx + ',' + idx + ',this.value)" ' +
        'oninput="updatePlayerName(' + teamIdx + ',' + idx + ',this.value)"/>' +
      (players.length > 1
        ? '<button class="player-del" onclick="removePlayer(' + teamIdx + ',' + idx + ')">✕</button>'
        : '<button class="player-del" disabled style="opacity:.3">✕</button>') +
    '</div>';
  }).join('');

  var addBtn = canAdd
    ? '<button class="player-add-btn" onclick="addPlayer(' + teamIdx + ')">+ Agregar jugador</button>'
    : '<div class="player-limit">Máximo 5 jugadores</div>';

  ov.innerHTML =
    '<div class="players-box">' +
      '<div class="players-title" style="color:' + tc.dark + '">' + TEAM_NAMES[teamIdx] + '</div>' +
      '<div class="players-subtitle">Jugadores (' + players.length + '/5)</div>' +
      '<div id="player-rows">' + rows + '</div>' +
      addBtn +
      '<button class="btn btn-primary" style="background:' + tc.grad + ';padding:11px 0;font-size:15px;margin-top:4px" ' +
        'onclick="closePlayers()">Listo ✓</button>' +
    '</div>';
}

function updatePlayerName(teamIdx, idx, val) {
  var trimmed = val.trim();
  if (trimmed.length > 0) PLAYERS[teamIdx][idx] = trimmed;
}

function addPlayer(teamIdx) {
  if (PLAYERS[teamIdx].length >= 5) return;
  var n = PLAYERS[teamIdx].length + 1;
  PLAYERS[teamIdx].push('Jugador ' + n);
  renderPlayersContent(teamIdx);
}

function removePlayer(teamIdx, idx) {
  if (PLAYERS[teamIdx].length <= 1) return;
  PLAYERS[teamIdx].splice(idx, 1);
  // Fix speaker index if out of bounds
  if (state.currentSpeaker[teamIdx] >= PLAYERS[teamIdx].length) {
    state.currentSpeaker[teamIdx] = 0;
  }
  renderPlayersContent(teamIdx);
}

function editTeamName(i) {
  var current = TEAM_NAMES[i];
  var tc = TC[i];
  // Create inline modal with input
  var existing = document.getElementById('name-editor');
  if (existing) existing.remove();
  var modal = document.createElement('div');
  modal.id = 'name-editor';
  modal.onclick = function(e) { if (e.target === modal) modal.remove(); };
  modal.innerHTML =
    '<div class="name-editor-box">' +
      '<div class="name-editor-title" style="color:' + tc.dark + '">Nombre del equipo</div>' +
      '<input id="name-input-' + i + '" class="name-input" maxlength="20" value="' + current + '" />' +
      '<div class="name-editor-btns">' +
        '<button class="btn-ghost" onclick="closeNameEditor()">Cancelar</button>' +
        '<button class="btn btn-primary" style="background:' + tc.grad + ';padding:10px 24px;font-size:15px" onclick="saveTeamName(' + i + ')">Guardar</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(modal);
  var inp = document.getElementById('name-input-' + i);
  if (inp) { inp.focus(); inp.select(); }
}

function saveTeamName(i) {
  var inp = document.getElementById('name-input-' + i);
  if (!inp) return;
  var val = inp.value.trim();
  if (val.length > 0) TEAM_NAMES[i] = val;
  closeNameEditor();
  renderHome();
}

function renderHome() {
  var isFirst = state.round===1 && state.currentTeam===0;
  var tc = TC[state.currentTeam];
  var s = document.getElementById('screen');
  s.style.animation='none'; s.offsetHeight; s.style.animation='fadeUp .35s both';

  makeBlobs([
    {top:'-80px',right:'-80px',w:'260px',h:'260px',c:'#F9A8C9',o:.22},
    {bottom:'-60px',left:'-60px',w:'200px',h:'200px',c:'#A8D4F9',o:.22},
    {top:'38%',left:'-40px',w:'130px',h:'130px',c:'#A8DFC9',o:.18}
  ]);

  var scoreCards = TEAM_NAMES.map(function(name, i) {
    var active = !isFirst && i===state.currentTeam;
    var bg = active ? TC[i].grad : '#fff';
    var bc = active ? TC[i].dark : TC[i].light;
    var sc = active ? 'scale(1.05)' : 'scale(1)';
    var sh = active ? '0 8px 22px ' + TC[i].light + '99' : '0 2px 10px rgba(0,0,0,.06)';
    var nc = active ? '#fff' : TC[i].dark;
    var vc = active ? '#fff' : '#3D2C40';
    var hintColor = active ? 'rgba(255,255,255,.55)' : TC[i].light;
    var editHint = isFirst ? '<div class="edit-hint" style="color:' + hintColor + '">✏️ editar</div>' : '';
    if (isFirst) {
      return '<div class="score-card" style="background:' + bg + ';border-color:' + bc + ';transform:' + sc + ';box-shadow:' + sh + '">' +
        '<div class="score-name" style="color:' + nc + ';cursor:pointer" onclick="editTeamName(' + i + ')">' + name + ' ✏️</div>' +
        '<div class="score-num" style="color:' + vc + '">' + state.scores[i] + '</div>' +
        '<button class="players-btn" style="color:' + TC[i].dark + ';border-color:' + TC[i].light + '" onclick="openPlayers(' + i + ')">' +
          '👥 ' + PLAYERS[i].length + ' jugadores' +
        '</button>' +
        '</div>';
    }
    return '<div class="score-card" style="background:' + bg + ';border-color:' + bc + ';transform:' + sc + ';box-shadow:' + sh + '">' +
      '<div class="score-name" style="color:' + nc + '">' + name + '</div>' +
      '<div class="score-num" style="color:' + vc + '">' + state.scores[i] + '</div>' +
      '</div>';
  }).join('');

  var startBg = isFirst ? 'linear-gradient(135deg,#C8B8F0,#A78BFA)' : tc.grad;
  var startSh = isFirst ? '#C8B8F066' : tc.light + '99';
  var startLabel = isFirst ? '✨ ¡Comenzar juego!' : '🎯 ¡Empezar turno!';

  s.innerHTML =
    '<div class="logo">Tabú Argentum</div>' +
    '<div class="' + (isFirst?'subtitle':'round-badge') + '">' + (isFirst ? 'el juego de las palabras prohibidas' : 'Ronda ' + state.round + ' de ' + settings.maxRounds) + '</div>' +
    '<div class="scoreboard">' + scoreCards + '</div>' +
    (!isFirst ? '<div class="turn-announce">Turno de <strong style="color:' + tc.dark + '">' + TEAM_NAMES[state.currentTeam] + '</strong>' +
      '<div class="speaker-announce">Da las pistas: <strong>' + PLAYERS[state.currentTeam][state.currentSpeaker[state.currentTeam]] + '</strong></div>' +
    '</div>' : '') +
    '<button class="btn btn-primary" style="background:' + startBg + ';box-shadow:0 6px 18px ' + startSh + '" onclick="startTurn()">' + startLabel + '</button>' +
    (!isFirst ? '<button class="btn-ghost" onclick="resetGame()">Reiniciar juego</button>' : '') +
    musicBtnHTML(false) +
    '<button class="btn-settings-icon" onclick="openSettings()">⚙️ Configuración</button>';
}

function renderPlaying() {
  var tc = TC[state.currentTeam];
  var pct = state.timeLeft / settings.turnDuration;
  var tColor = pct>.5 ? '#3BAE7E' : pct>.2 ? '#E8854A' : '#E8325A';
  var tBg    = pct>.5 ? '#A8DFC9' : pct>.2 ? '#FFCBA4' : '#FFB3C1';
  var correct = state.turnHistory.filter(function(h){ return h.result==='correct'; }).length;
  var tabu    = state.turnHistory.filter(function(h){ return h.result==='tabu'; }).length;

  makeBlobs([
    {top:'-60px',right:'-60px',w:'190px',h:'190px',c:tc.light,o:.28},
    {bottom:'-40px',left:'-40px',w:'150px',h:'150px',c:'#A8DFC9',o:.22}
  ]);

  var s = document.getElementById('screen');
  s.style.animation='none';
  s.innerHTML =
    '<div class="timer-row">' +
      '<div class="timer-circle" id="timer-circle" style="border-color:' + tColor + ';color:' + tColor + ';background:' + tBg + '">' +
        '<span class="timer-num" id="timer-num">' + state.timeLeft + '</span>' +
      '</div>' +
      '<div style="flex:1"><div class="team-badge" style="background:' + tc.grad + '">' + TEAM_NAMES[state.currentTeam] + '</div></div>' +
      '<div class="mini-score">' +
        '<span id="mini-correct" style="background:#D4F5E4;color:#3BAE7E">✓ ' + correct + '</span>' +
        '<span id="mini-tabu" style="background:#FFE0E8;color:#E8325A">🚫 ' + tabu + '</span>' +
      '</div>' +
    '</div>' +
    '<div id="card-area"></div>' +
    '<div class="actions" id="actions-area"></div>' +
    '<button class="btn-ghost" onclick="endTurn()">Terminar turno</button>' +
    musicBtnHTML(true) +
    '<div class="history-chips" id="mini-history"></div>';

  renderCard();
  renderActions();
  renderMiniHistory();
}

function renderReview() {
  var tc = TC[state.currentTeam];
  var correct = state.turnHistory.filter(function(h){ return h.result==='correct'; }).length;
  var tabu    = state.turnHistory.filter(function(h){ return h.result==='tabu'; }).length;
  var skip    = state.turnHistory.filter(function(h){ return h.result==='skip'; }).length;
  makeBlobs([]);

  var histRows = state.turnHistory.map(function(h) {
    var bc = h.result==='correct' ? '#3BAE7E' : h.result==='tabu' ? '#E8325A' : '#C9960A';
    var bg = h.result==='correct' ? '#EEFAF4' : h.result==='tabu' ? '#FFF0F3' : '#FFFBEA';
    var icon = h.result==='correct' ? '✓' : h.result==='tabu' ? '🚫' : '⏭';
    return '<div class="history-row" style="background:' + bg + ';border-left-color:' + bc + '">' + icon + ' ' + h.word + '</div>';
  }).join('');

  var s = document.getElementById('screen');
  s.style.animation='none'; s.offsetHeight; s.style.animation='fadeUp .35s both';
  s.innerHTML =
    '<div class="logo" style="font-size:38px;color:#3D2C40">Fin del turno</div>' +
    '<div class="team-badge" style="background:' + tc.grad + '">' + TEAM_NAMES[state.currentTeam] + '</div>' +
    '<div class="review-stats">' +
      '<div class="stat-box" style="background:#D4F5E4;border-color:#A8DFC9"><div class="stat-num" style="color:#3BAE7E">' + correct + '</div><div class="stat-label" style="color:#3BAE7E">CORRECTAS</div></div>' +
      '<div class="stat-box" style="background:#FFE0E8;border-color:#FFB3C1"><div class="stat-num" style="color:#E8325A">' + tabu + '</div><div class="stat-label" style="color:#E8325A">TABÚ (−1)</div></div>' +
      '<div class="stat-box" style="background:#FFF7D4;border-color:#FFE599"><div class="stat-num" style="color:#C9960A">' + skip + '</div><div class="stat-label" style="color:#C9960A">PASADAS</div></div>' +
    '</div>' +
    '<div class="history-list">' + histRows + '</div>' +
    '<button class="btn btn-primary" style="background:' + tc.grad + ';box-shadow:0 6px 18px ' + tc.light + '99" onclick="nextTurn()">Continuar →</button>';
}

function renderGameover() {
  var winner = state.scores[0]>state.scores[1] ? 0 : state.scores[1]>state.scores[0] ? 1 : -1;
  makeBlobs([]);

  var scoreCards = TEAM_NAMES.map(function(name, i) {
    var w = i===winner;
    var bg = w ? TC[i].grad : '#fff';
    var bc = w ? TC[i].dark : TC[i].light;
    var sc = w ? 'scale(1.07)' : 'scale(1)';
    var sh = w ? '0 10px 26px ' + TC[i].light + '99' : '0 2px 10px rgba(0,0,0,.06)';
    var nc = w ? '#fff' : TC[i].dark;
    var vc = w ? '#fff' : '#3D2C40';
    return '<div class="score-card" style="background:' + bg + ';border-color:' + bc + ';transform:' + sc + ';box-shadow:' + sh + '">' +
      '<div class="score-name" style="color:' + nc + '">' + name + '</div>' +
      '<div class="score-num" style="color:' + vc + '">' + state.scores[i] + '</div>' +
      (w ? '<div style="font-size:20px;margin-top:4px">🏆</div>' : '') +
      '</div>';
  }).join('');

  var winnerHtml = winner===-1
    ? '<div style="font-size:22px;font-weight:800;color:#C9960A">🤝 ¡Empate!</div>'
    : '<div style="font-size:20px;font-weight:800;color:' + TC[winner].dark + '">🏆 ¡Ganó ' + TEAM_NAMES[winner] + '!</div>';

  var s = document.getElementById('screen');
  s.style.animation='none'; s.offsetHeight; s.style.animation='popIn .5s both';
  s.innerHTML =
    '<div class="logo">¡Fin!</div>' +
    winnerHtml +
    '<div class="scoreboard">' + scoreCards + '</div>' +
    '<button class="btn btn-primary" style="background:linear-gradient(135deg,#C8B8F0,#A78BFA);box-shadow:0 6px 18px #C8B8F066" onclick="resetGame()">✨ Jugar de nuevo</button>';
}

function renderCurrent() {
  var t = getTheme();
  document.body.style.background = t.bg;
  if      (state.screen==='home')     renderHome();
  else if (state.screen==='playing')  renderPlaying();
  else if (state.screen==='review')   renderReview();
  else if (state.screen==='gameover') renderGameover();
}

applyTheme(settings.theme);

</script>
